<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Main Navbar Container */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60.7px;
      background: rgba(26, 10, 46, 0.95);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15.8px;
      box-sizing: border-box;
      z-index: 1000;
    }

    /* Navbar Container Context - LEFT */
    .navbar__content-left {
      position: absolute;
      left: 15.8px;
      top: 0;
      height: 60.7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The Exact Glassy Back Button */
    .back-btn {
      position: relative;
      /* Needed for pseudo-element positioning */
      width: 42.2px;
      height: 42.2px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;

      /* 1. Main Glass Gradient */
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.1) 100%);

      /* 2. Glass Border: Very thin and semi-transparent */
      border: 0.8px solid rgba(255, 255, 255, 0.15);

      /* 3. Layered Shadows: Outer drop shadow + Inset glass highlight */
      box-shadow:
        0 2.6px 9.2px rgba(0, 0, 0, 0.15),
        inset 0 0.6px 1.3px rgba(255, 255, 255, 0.2);

      overflow: hidden;
      /* Clips the internal reflection */
      transition: all 0.2s ease;
    }

    /* 4. Specular Highlight (The 'Glass' Shine) */
    .back-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: 4px;
      right: 4px;
      height: 45%;
      /* Covers only the top part */
      background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(0, 0, 0, 0));
      border-radius: 50% 50% 0 0;
      /* Matches the top curve */
      pointer-events: none;
    }

    /* Interaction Effects */
    .back-btn:active {
      transform: scale(0.94);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.15) 100%);
    }

    /* SVG Arrow */
    .back-btn svg {
      color: #ffffff;
      z-index: 1;
      /* Keep above reflection */
    }

    /* Navbar Container Context - CENTER */
    .navbar__content-center {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 256px;
      /* Extracted exact width */
      height: 47px;
      /* Extracted exact height */
      margin: 0 auto;
    }

    /* SVG Sizing */
    .brand-logo-svg {
      display: block;
      height: 100%;
      width: auto;
    }

    /* Branding Text Styling */
    .brand-logo-svg text {
      -webkit-user-select: none;
      user-select: none;
    }

    /* Navbar Container Context - RIGHT */
    .navbar__content-right {
      position: absolute;
      right: 15.8px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* Container for the more actions button */
    .WinGo__C-head-more {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 76.5px;
      /* Exact 1.54rem width */
      height: 31.6px;
      /* Exact 0.64rem height */
    }

    /* Common style for both icon buttons */
    .head-more-icon {
      width: 31.6px;
      height: 31.6px;
      background-size: contain;
      background-repeat: no-repeat;
      display: block;
      cursor: pointer;
      transition: opacity 0.1s;
    }

    .head-more-icon:active {
      opacity: 0.6;
    }

      height: 100vh;
      margin: 0;
      padding-top: 60.7px;

    }

<body>
  <!-- COMPLETE TOP NAVBAR -->
  <nav class="navbar">
    <!-- LEFT: Back Button -->
    <div class="navbar__content-left">
      <div class="back-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M11.25 3.75L5.25 9L11.25 14.25" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"
            stroke-linejoin="round"></path>
        </svg>
      </div>
    </div>

    <!-- CENTER: Brand Logo -->
    <div class="navbar__content-center">
      <!-- Exact Brand Logo SVG with all gradients and filters -->
      <svg class="brand-logo-svg" viewBox="0 0 388 72" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- 1. Gold Shimmer for the Crown Icon -->
          <linearGradient id="blCrown" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff1b8"></stop>
            <stop offset="50%" stop-color="#e8a735"></stop>
            <stop offset="100%" stop-color="#c68a1d"></stop>
          </linearGradient>

          <!-- 2. Multi-stop Gold Gradient for the RAJALUCK Text -->
          <linearGradient id="blText" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff8e1"></stop>
            <stop offset="20%" stop-color="#ffd54f"></stop>
            <stop offset="45%" stop-color="#e8a735"></stop>
            <stop offset="55%" stop-color="#a06a10"></stop>
            <stop offset="75%" stop-color="#e8a735"></stop>
            <stop offset="100%" stop-color="#fff1b8"></stop>
          </linearGradient>

          <!-- 3. Glassy Drop Shadow Filter -->
          <filter id="blShadow" x="-10%" y="-10%" width="130%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="rgba(0,0,0,0.35)"></feDropShadow>
          </filter>

          <!-- 4. Subtle Gold Underline Gradient -->
          <linearGradient id="blLine" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="rgba(232,167,53,0)"></stop>
            <stop offset="50%" stop-color="#ffd54f"></stop>
            <stop offset="100%" stop-color="rgba(232,167,53,0)"></stop>
          </linearGradient>
        </defs>

        <!-- Bottom Decorative Gold Line -->
        <rect x="10" width="368" y="61" height="1.5" rx="0.75" fill="url(#blLine)" opacity="0.6"></rect>

        <!-- Crown Icon -->
        <text x="4" y="50" font-size="46" font-weight="900" fill="url(#blCrown)" font-family="serif">♛</text>

        <!-- Brand Name Text with Filter and Letter Spacing -->
        <text x="50" y="48" font-size="38" font-weight="900" letter-spacing="4" fill="url(#blText)"
          filter="url(#blShadow)" font-family="Georgia, serif">RAJALUCK</text>
      </svg>
    </div>

    <!-- RIGHT: Action Buttons -->
    <div class="navbar__content-right">
      <!-- Main Actions Container -->
      <div class="WinGo__C-head-more">
        <!-- 1. Customer Service Icon -->
        <div class="head-more-icon icon-service"></div>

        <!-- 2. Menu Icon -->
        <div class="head-more-icon icon-more"></div>
      </div>
    </div>
  </nav>


</body>

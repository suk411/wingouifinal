<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --gold: #ffc837;
      --gold-glow: rgba(255, 200, 55, 0.35);
      --sweep-gradient: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    }

    body {
      background: #0d0618;
      font-family: -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      padding: 50px;
    }

    .Betting__C {
      position: relative;
      width: 445.6px;
      height: 377px;
      padding: 10px 15px;
      border-radius: 13.2px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02));
      backdrop-filter: blur(10.5px);
      box-shadow: 0 2.6px 15.8px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      animation: staggerIn 0.4s ease-out both;
    }

    /* Reflections */
    .glossy-btn {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      text-transform: capitalize;
      cursor: pointer;
    }

    .glossy-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -150%;
      width: 50%;
      height: 100%;
      background: var(--sweep-gradient);
      animation: colorBtnSweep 3s ease-in-out infinite;
    }

    /* Sections */
    .Betting__C-head {
      display: flex;
      justify-content: space-between;
      height: 46px;
      margin-bottom: 17px;
    }

    .Betting__C-head div {
      width: 127px;
      font-size: 18.5px;
      border-radius: 13.2px;
    }

    .Betting__C-head-g {
      background: linear-gradient(135deg, #2d8a56, #40ad72);
      border-radius: 0 13.2px !important;
    }

    .Betting__C-head-p {
      background: linear-gradient(135deg, #8b2fc7, #b659fe);
    }

    .Betting__C-head-r {
      background: linear-gradient(135deg, #d03840, #fd565c);
      border-radius: 13.2px 0 !important;
    }

    /* --- ALL BETTING NUMBERS (Grid 0-9) --- */
    .Betting__C-numC {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 8px 13px;
      border-radius: 13.2px;
      margin-top: 17px;
      background: linear-gradient(135deg, rgba(45, 21, 96, 0.4), rgba(26, 10, 46, 0.5));
    }

    .Betting__C-numC div {
      height: 76px;
      background-size: 72px;
      background-repeat: no-repeat;
      background-position: center;
      cursor: pointer;
    }

    .n0 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n0-109d08f7.png");
    }

    .n1 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n1-a13fc3c4.png");
    }

    .n2 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n2-721ead86.png");
    }

    .n3 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n3-2e90ab38.png");
    }

    .n4 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n4-7d4ec191.png");
    }

    .n5 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n5-ba36bb22.png");
    }

    .n6 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n6-96748fa3.png");
    }

    .n7 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n7-8ba4bcca.png");
    }

    .n8 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n8-c7f0780b.png");
    }

    .n9 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n9-8b04e5c6.png");
    }

    /* --- MULTIPLE SECTION --- */
    .Betting__C-multiple {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14.5px;
      height: 44.9px;
    }

    .Betting__C-multiple-l {
      color: var(--gold);
      font-size: 18.5px;
      width: 105.6px;
    }

    .Betting__C-multiple-r {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.5);
      width: 48.8px;
      height: 39.6px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10.5px;
      font-size: 15.8px;
      cursor: pointer;
    }

    .Betting__C-multiple-r.active {
      background: linear-gradient(135deg, var(--gold), #e8a820);
      color: #1a0a2e;
      font-weight: 600;
      box-shadow: 0 1.3px 5.3px rgba(255, 200, 55, 0.3);
    }

    /* Foot Buttons */
    .Betting__C-foot {
      display: flex;
      justify-content: center;
      height: 47.5px;
      margin-top: 13.2px;
    }

    .Betting__C-foot div {
      width: 204.6px;
      font-size: 21px;
    }

    .Betting__C-foot-b {
      background: linear-gradient(135deg, var(--gold), #e8a820);
      border-radius: 26.4px 0 0 26.4px;
      color: #1a0a2e !important;
    }

    .Betting__C-foot-s {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 0 26.4px 26.4px 0;
    }

    @keyframes colorBtnSweep {
      0% {
        transform: translateX(-150%);
      }

      100% {
        transform: translateX(450%);
      }
    }

    @keyframes staggerIn {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }

      100% {
        opacity: 1;
        transform: translateY(0px);
      }
    }
  </style>
</head>

<body>

  <div class="Betting__C">
    <!-- Header Selection -->
    <div class="Betting__C-head">
      <div class="Betting__C-head-g glossy-btn">green</div>
      <div class="Betting__C-head-p glossy-btn">purple</div>
      <div class="Betting__C-head-r glossy-btn">red</div>
    </div>

    <!-- 0-9 Numbers Grid -->
    <div class="Betting__C-numC">
      <div class="n0"></div>
      <div class="n1"></div>
      <div class="n2"></div>
      <div class="n3"></div>
      <div class="n4"></div>
      <div class="n5"></div>
      <div class="n6"></div>
      <div class="n7"></div>
      <div class="n8"></div>
      <div class="n9"></div>
    </div>

    <!-- Multiplier Selection -->
    <div class="Betting__C-multiple">
      <div class="Betting__C-multiple-l">random bet</div>
      <div class="Betting__C-multiple-r active">X1</div>
      <div class="Betting__C-multiple-r">X5</div>
      <div class="Betting__C-multiple-r">X10</div>
      <div class="Betting__C-multiple-r">X20</div>
      <div class="Betting__C-multiple-r">X50</div>
      <div class="Betting__C-multiple-r">X100</div>
    </div>

    <!-- Foot Selection -->
    <div class="Betting__C-foot">
      <div class="Betting__C-foot-b glossy-btn">Big</div>
      <div class="Betting__C-foot-s glossy-btn">small</div>
    </div>
  </div>

</body>

</html>

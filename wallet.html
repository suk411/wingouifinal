<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --font-stack: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, "Segoe UI", Arial, sans-serif;
      --glass-card-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.04) 100%);
      --gold-grad: linear-gradient(135deg, #FFC837 0%, #E8A820 100%);
      --purple-grad: linear-gradient(135deg, #7C3AED 0%, #A855F7 100%);
    }

    body {
      background-color: #1a0a2e;
      height: 100vh;
      margin: 0;
      padding-top: 60.7px;
      font-family: var(--font-stack);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60.7px;
      background: rgba(26, 10, 46, 0.95);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15.8px;
      box-sizing: border-box;
      z-index: 1000;
    }

    .navbar__content-left {
      position: absolute;
      left: 15.8px;
      top: 0;
      height: 60.7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-btn {
      position: relative;
      width: 42.2px;
      height: 42.2px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.1) 100%);
      border: 0.8px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 2.6px 9.2px rgba(0, 0, 0, 0.15),
        inset 0 0.6px 1.3px rgba(255, 255, 255, 0.2);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .back-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: 4px;
      right: 4px;
      height: 45%;
      background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(0, 0, 0, 0));
      border-radius: 50% 50% 0 0;
      pointer-events: none;
    }

    .back-btn:active {
      transform: scale(0.94);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.15) 100%);
    }

    .back-btn svg {
      color: #ffffff;
      z-index: 1;
    }

    .navbar__content-center {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 256px;
      height: 47px;
      margin: 0 auto;
    }

    .brand-logo-svg {
      display: block;
      height: 100%;
      width: auto;
    }

    .navbar__content-right {
      position: absolute;
      right: 15.8px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 10px;
    }

    .WinGo__C-head-more {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .head-more-icon {
      width: 31.6px;
      height: 31.6px;
      background-size: contain;
      background-repeat: no-repeat;
      display: block;
      cursor: pointer;
      transition: opacity 0.1s;
    }

    .head-more-icon:active {
      opacity: 0.6;
    }

    /* Wallet Card */
    .Wallet__C {
      width: 445px;
      padding: 23px 17px;
      margin-top: 20px;
    }

    .Wallet__C-balance {
      position: relative;
      background: var(--glass-card-bg);
      backdrop-filter: blur(13.2px);
      -webkit-backdrop-filter: blur(13.2px);
      border-radius: 26px;
      border: 0.8px solid rgba(255, 200, 55, 0.15);
      padding: 23px 27px 20px;
      box-shadow: inset 0 0.6px 1.3px rgba(255, 255, 255, 0.2);
      overflow: hidden;
    }

    .Wallet__C-balance-l1 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 26.4px;
      font-weight: 700;
      color: #FFC837;
    }

    .Wallet__C-balance-l1 img {
      width: 28px;
      height: 28px;
    }

    .Wallet__C-balance-l2 {
      margin-top: 9px;
      font-size: 17.1px;
      color: rgba(255, 255, 255, 0.6);
      text-transform: capitalize;
      text-align: center;
    }

    .Wallet__C-balance-l3 {
      margin-top: 23px;
      display: flex;
      justify-content: space-between;
      gap: 15px;
    }

    .glass-btn {
      position: relative;
      flex: 1;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 26px;
      font-weight: 600;
      font-size: 19.8px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.1s;
    }

    .glass-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: 2px;
      right: 2px;
      height: 45%;
      background: linear-gradient(rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0));
      border-radius: 20px 20px 0 0;
      pointer-events: none;
    }

    .btn-withdraw {
      background: var(--purple-grad);
      color: #fff;
      box-shadow: 0 2.6px 7.9px rgba(124, 58, 237, 0.3), inset 0 0.6px 1.3px rgba(255, 255, 255, 0.3);
    }

    .btn-deposit {
      background: var(--gold-grad);
      color: #1A0A2E;
      box-shadow: 0 2.6px 7.9px rgba(255, 200, 55, 0.3), inset 0 0.6px 1.3px rgba(255, 255, 255, 0.4);
    }

    .glass-btn:active {
      transform: scale(0.96);
    }

    .refresh {
      background: rgba(255, 255, 255, 0.08);
      border: 0.8px solid rgba(255, 200, 55, 0.25);
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar__content-left">
      <div class="back-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M11.25 3.75L5.25 9L11.25 14.25" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"
            stroke-linejoin="round"></path>
        </svg>
      </div>
    </div>

    <div class="navbar__content-center">
      <svg class="brand-logo-svg" viewBox="0 0 388 72" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="blCrown" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff1b8"></stop>
            <stop offset="50%" stop-color="#e8a735"></stop>
            <stop offset="100%" stop-color="#c68a1d"></stop>
          </linearGradient>
          <linearGradient id="blText" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff8e1"></stop>
            <stop offset="20%" stop-color="#ffd54f"></stop>
            <stop offset="45%" stop-color="#e8a735"></stop>
            <stop offset="55%" stop-color="#a06a10"></stop>
            <stop offset="75%" stop-color="#e8a735"></stop>
            <stop offset="100%" stop-color="#fff1b8"></stop>
          </linearGradient>
          <filter id="blShadow" x="-10%" y="-10%" width="130%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="rgba(0,0,0,0.35)"></feDropShadow>
          </filter>
          <linearGradient id="blLine" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="rgba(232,167,53,0)"></stop>
            <stop offset="50%" stop-color="#ffd54f"></stop>
            <stop offset="100%" stop-color="rgba(232,167,53,0)"></stop>
          </linearGradient>
        </defs>
        <rect x="10" width="368" y="61" height="1.5" rx="0.75" fill="url(#blLine)" opacity="0.6"></rect>
        <text x="4" y="50" font-size="46" font-weight="900" fill="url(#blCrown)" font-family="serif">♛</text>
        <text x="50" y="48" font-size="38" font-weight="900" letter-spacing="4" fill="url(#blText)"
          filter="url(#blShadow)" font-family="Georgia, serif">RAJALUCK</text>
      </svg>
    </div>

    <div class="navbar__content-right">
      <div class="WinGo__C-head-more">
        <div class="head-more-icon icon-service"></div>
        <div class="head-more-icon icon-more"></div>
        <!-- Newly added icons -->
        <div class="head-more-icon" style="background-image:url('assets/nav_sound.png');"></div>
        <div class="head-more-icon" style="background-image:url('assets/nav_cs.png');"></div>
      </div>
    </div>
  </nav>

  <!-- Wallet Balance Card -->
  <div class="Wallet__C">
    <div class="Wallet__C-balance">
      <div class="Wallet__C-balance-l1">
        <img src="assets/wallet_bal_icon.png" alt="Wallet Icon">
        <div>₹0.90</div>
        <div class="refresh">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFC837" stroke-width="2.5">
            <path d="M21 12a9 9 0 0 1-15.3 6.4M3 12a9 9 0 0 1 15.3-6.4M21 3v6h-6M3 21v-6h6" />
          </svg>
        </div>
      </div>
      <div class="Wallet__C-balance-l2">wallet balance</div>
      <div class="Wallet__C-balance-l3">
        <div class="glass-btn btn-withdraw">Withdraw</div>
        <div class="glass-btn btn-deposit">Deposit</div>
      </div>
    </div>
  </div>
</body>

</html>

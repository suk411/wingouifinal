<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --gold: #ffc837;
      --gold-alpha: rgba(255, 200, 55, 0.8);
      --bg-glass: linear-gradient(135deg, rgba(26, 10, 46, 0.88) 0%, rgba(45, 21, 96, 0.78) 50%, rgba(58, 29, 114, 0.88) 100%);
    }

    .TimeLeft__C {
      position: relative;
      width: 445.66px;
      height: 132.05px;
      margin: 23.77px auto;
      border-radius: 13.2px;
      background: url("https://20518.rajaluckking.com/assets/png/diban-f66383f9.png") no-repeat center / 100% 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      animation: staggerIn 0.4s ease-out both;
    }

    /* Reflection & Glassy Base Layer */
    .TimeLeft__C::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(45deg, transparent, transparent 7.9px, rgba(255, 200, 55, 0.03) 7.9px, rgba(255, 200, 55, 0.03) 8.6px),
        var(--bg-glass);
      z-index: 0;
    }

    /* Bottom highlight line */
    .TimeLeft__C::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: -100%;
      width: 200%;
      height: 1.3px;
      background: linear-gradient(90deg, transparent 0%, var(--gold-alpha) 50%, transparent 100%);
    }

    /* Animated Scanline Reflection */
    .TimeLeft__C-scanline {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .TimeLeft__C-scanline::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 50px;
      background: linear-gradient(transparent, rgba(255, 200, 55, 0.06), transparent);
      animation: scanDown 4s ease-in-out infinite;
    }

    /* Glassy Digit Styling */
    .TimeLeft__C-time-digit {
      position: relative;
      width: 37px;
      height: 45px;
      margin: 0 2.6px;
      border-radius: 6.6px;
      background: linear-gradient(rgba(255, 200, 55, 0.15) 0%, rgba(255, 200, 55, 0.05) 50%, transparent 50%, rgba(255, 200, 55, 0.12) 100%);
      box-shadow: 0 0 10.5px rgba(255, 200, 55, 0.15), 0 2.6px 7.9px rgba(0, 0, 0, 0.3), inset 0 0.6px 0 rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Top & Side glints for 3D/Glass look */
    .TimeLeft__C-time-digit::before {
      content: "";
      position: absolute;
      top: 0;
      left: 10%;
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-alpha), transparent);
    }

    .TimeLeft__C-time-digit::after {
      content: "";
      position: absolute;
      left: 0;
      top: 15%;
      width: 1px;
      height: 70%;
      background: linear-gradient(transparent, rgba(255, 200, 55, 0.3), transparent);
    }

    .TimeLeft__C-time-digit span {
      color: var(--gold);
      font-size: 27.7px;
      font-weight: 800;
      text-shadow: 0 0 7.9px rgba(255, 200, 55, 0.6);
    }

    /* Binking Colon */
    .TimeLeft__C-time-colon {
      color: var(--gold);
      font-size: 26.4px;
      font-weight: 800;
      animation: colonBlink 1s steps(1) infinite;
      text-shadow: 0 0 6.6px var(--gold-alpha);
    }

    /* Animations */
    @keyframes scanDown {

      0%,
      100% {
        top: -40%;
      }

      50% {
        top: 100%;
      }
    }

    @keyframes colonBlink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }
    }

    @keyframes staggerIn {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }

      100% {
        opacity: 1;
        transform: translateY(0px);
      }
    }

    /* Corners */
    .TimeLeft__C-corner {
      position: absolute;
      width: 5.3px;
      height: 5.3px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 5.3px 1.3px rgba(255, 200, 55, 0.6);
      z-index: 2;
    }

    .tl {
      top: 6.6px;
      left: 6.6px;
    }

    .tr {
      top: 6.6px;
      right: 6.6px;
    }

    .bl {
      bottom: 6.6px;
      left: 6.6px;
    }

    .br {
      bottom: 6.6px;
      right: 6.6px;
    }

    /* Other content */
    .TimeLeft__C-rule {
      position: absolute;
      top: 14.5px;
      left: 14.5px;
      border: 1px solid rgba(255, 200, 55, 0.35);
      border-radius: 40px;
      padding: 5px 15px;
      color: var(--gold);
      font-size: 14px;
      z-index: 3;
    }

    .TimeLeft__C-name {
      position: absolute;
      top: 47.5px;
      left: 14.5px;
      color: #fffb;
      z-index: 3;
    }

    .TimeLeft__C-num {
      position: absolute;
      bottom: 15px;
      left: 15px;
      display: flex;
      z-index: 3;
    }

    .TimeLeft__C-num div {
      width: 33px;
      height: 33px;
      background-size: contain;
      margin-right: 8px;
    }

    .n2 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n2-721ead86.png");
    }

    .n9 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n9-8b04e5c6.png");
    }

    .n0 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n0-73891783.png");
    }

    .n1 {
      background-image: url("https://20518.rajaluckking.com/assets/png/n1-7290117a.png");
    }

    .TimeLeft__C-id {
      position: absolute;
      bottom: 11px;
      right: 15px;
      color: var(--gold);
      font-weight: 700;
      font-size: 21px;
      z-index: 3;
    }

    .TimeLeft__C-text {
      position: absolute;
      top: 17px;
      right: 15px;
      color: #fff8;
      font-weight: 700;
      z-index: 3;
    }
  </style>
</head>

<body>
  <div class="TimeLeft__C">
    <div class="TimeLeft__C-scanline"></div>
    <div class="TimeLeft__C-corner tl"></div>
    <div class="TimeLeft__C-corner tr"></div>
    <div class="TimeLeft__C-corner bl"></div>
    <div class="TimeLeft__C-corner br"></div>

    <div class="TimeLeft__C-rule">How to play</div>
    <div class="TimeLeft__C-name">Win Go 30s</div>

    <div class="TimeLeft__C-num">
      <div class="n2"></div>
      <div class="n9"></div>
      <div class="n0"></div>
      <div class="n1"></div>
      <div class="n9"></div>
    </div>

    <div class="TimeLeft__C-text">time of purchase</div>

    <div style="position: absolute; top: 43px; right: 15px; display: flex; align-items: center; z-index: 3;">
      <div class="TimeLeft__C-time-digit"><span>0</span></div>
      <div class="TimeLeft__C-time-digit"><span>0</span></div>
      <div class="TimeLeft__C-time-colon">:</div>
      <div class="TimeLeft__C-time-digit"><span>1</span></div>
      <div class="TimeLeft__C-time-digit"><span>6</span></div>
    </div>

    <div class="TimeLeft__C-id">20260425302446</div>
  </div>
</body>

</html>
